<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Route Leads</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="search">
    <header id="app-header"></header>
    <main class="page-shell">
      <section class="page-title">
        <div>
          <p class="eyebrow">Requesting Parent</p>
          <h1>Find a Route Lead this week.</h1>
        </div>
        <p>Select a day, school, radius, and departure window before booking the chosen Lead.</p>
      </section>

      <section class="panel search-panel">
        <form class="search-grid" id="search-form">
          <label>
            School destination
            <select id="search-school"></select>
          </label>
          <label>
            Day this week
            <select id="search-date"></select>
          </label>
          <div class="input-pair" aria-label="Departure timeframe">
            <label>
              From
              <input id="search-from" required type="time" value="07:45" />
            </label>
            <label>
              Until
              <input id="search-until" required type="time" value="08:30" />
            </label>
          </div>
          <label class="radius-field">
            Radius from your home
            <span>
              <input id="search-radius" type="range" min="0.5" max="3" step="0.25" value="1" />
              <output id="search-radius-output" for="search-radius">1 km</output>
            </span>
          </label>
          <button class="primary-button" type="submit">Refresh matches</button>
        </form>

        <section class="match-bar">
          <div>
            <p class="eyebrow">Matches</p>
            <h2 id="search-summary"></h2>
          </div>
          <div class="selection-pill" id="lead-selection">Select a Route Lead</div>
        </section>

        <div class="lead-list" id="search-results"></div>
      </section>

      <section class="panel booking-panel" id="booking-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Booking</p>
            <h2>Confirm selection</h2>
          </div>
          <button class="primary-button" id="book-lead" type="button" disabled>Book Route Lead</button>
        </div>
        <p id="booking-copy">Select a Route Lead to create a pending request and open chat.</p>
        <section class="chat-panel" id="search-chat"></section>
      </section>
    </main>
    <script src="./demo-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
